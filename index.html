<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invila Financial Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .finance-card { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .gold-bright { color: #fbbf24; }
        input { font-size: 1.15rem !important; font-weight: 700 !important; transition: all 0.3s ease; }
        .chart-container { position: relative; height: 350px; width: 100%; }
        
        /* Table Styles */
        .table-container { overflow-x: auto; border-radius: 1.5rem; border: 1px solid #e2e8f0; background: white; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background-color: #f8fafc; color: #64748b; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; padding: 1rem; text-align: right; border-bottom: 2px solid #f1f5f9; }
        td { padding: 1rem; text-align: right; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        tr:hover td { background-color: #f0f9ff; }
        .text-pdam { color: #0f172a; font-weight: 700; }
        .text-invila { color: #059669; font-weight: 700; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto space-y-8">
        
        <div class="bg-white rounded-[2.5rem] shadow-xl border border-slate-200 overflow-hidden">
            <div class="p-8 bg-slate-50 border-b border-slate-100">
                <h1 class="text-2xl font-black text-slate-800 italic uppercase italic">Simulasi Finansial SPAM Invila™</h1>
                <p class="text-slate-500 text-sm font-medium italic">Perbandingan Akumulasi Biaya Tradisional vs Invila WaaS</p>
            </div>

            <div class="p-8 grid md:grid-cols-3 gap-6">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-2">Volume (m³/hari)</label>
                    <input type="number" id="vol_total" value="2000" oninput="updateDashboard()" class="w-full border-2 border-slate-200 p-3 rounded-xl outline-none focus:border-blue-600 italic">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-2">Tarif PDAM (Rp/m³)</label>
                    <input type="number" id="pdam_price" value="14600" oninput="updateDashboard()" class="w-full border-2 border-slate-200 p-3 rounded-xl outline-none focus:border-blue-600 italic">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-2">Jasa Invila (Rp/m³)</label>
                    <input type="number" id="invila_price" value="6900" oninput="updateDashboard()" class="w-full bg-blue-50 border-2 border-blue-200 p-3 rounded-xl outline-none focus:border-blue-600 italic text-blue-700">
                </div>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-xl border border-slate-200 p-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-extrabold text-slate-800 uppercase italic">Grafik Akumulasi Biaya (5 Tahun)</h2>
                <div class="flex gap-4 text-[10px] font-bold uppercase">
                    <span class="flex items-center gap-1"><span class="w-3 h-3 bg-slate-900 rounded"></span> Tradisional</span>
                    <span class="flex items-center gap-1"><span class="w-3 h-3 bg-emerald-500 rounded"></span> Invila WaaS</span>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="costChart"></canvas>
            </div>
        </div>

        <div class="table-container shadow-xl">
            <table id="financeTable">
                <thead>
                    <tr>
                        <th style="text-align: left;">Tahun</th>
                        <th>Capex Tradisional</th>
                        <th>Opex Tradisional</th>
                        <th>Opex Invila WaaS</th>
                        <th>Akumulasi Tradisional</th>
                        <th>Akumulasi Invila</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        let myChart;

        function updateDashboard() {
            const vol = parseFloat(document.getElementById('vol_total').value) || 0;
            const pdamPrice = parseFloat(document.getElementById('pdam_price').value) || 0;
            const invilaPrice = parseFloat(document.getElementById('invila_price').value) || 0;

            const lps = vol / 86.4;
            const capexTradisional = lps * 350000000; // Rp 350jt/LPS
            const annualOpexPdam = pdamPrice * vol * 30 * 12;
            const annualOpexInvila = invilaPrice * vol * 30 * 12;

            let labels = ['Tahun 0', 'Thn 1', 'Thn 2', 'Thn 3', 'Thn 4', 'Thn 5'];
            let dataTradisional = [capexTradisional];
            let dataInvila = [0]; // Zero Capex di awal
            
            let tableHtml = '';
            const fmt = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 });

            for (let i = 0; i <= 5; i++) {
                if (i > 0) {
                    // Eskalasi 2% per tahun
                    const factor = Math.pow(1.02, i - 1);
                    dataTradisional.push(dataTradisional[i-1] + (annualOpexPdam * factor));
                    dataInvila.push(dataInvila[i-1] + (annualOpexInvila * factor));
                }

                tableHtml += `
                    <tr>
                        <td style="text-align: left; font-weight: 800;">Tahun ${i}</td>
                        <td class="text-slate-400">${i === 0 ? fmt.format(capexTradisional) : '-'}</td>
                        <td class="text-slate-600">${i === 0 ? '-' : fmt.format(annualOpexPdam * Math.pow(1.02, i-1))}</td>
                        <td class="text-emerald-600 font-semibold">${i === 0 ? '-' : fmt.format(annualOpexInvila * Math.pow(1.02, i-1))}</td>
                        <td class="text-pdam">${fmt.format(dataTradisional[i])}</td>
                        <td class="text-invila">${fmt.format(dataInvila[i])}</td>
                    </tr>
                `;
            }

            document.getElementById('tableBody').innerHTML = tableHtml;
            renderChart(labels, dataTradisional, dataInvila);
        }

        function renderChart(labels, dataTradisional, dataInvila) {
            const ctx = document.getElementById('costChart').getContext('2d');
            
            if (myChart) {
                myChart.destroy();
            }

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Tradisional (Capex + Opex)',
                            data: dataTradisional,
                            borderColor: '#0f172a',
                            backgroundColor: 'transparent',
                            borderWidth: 4,
                            pointBackgroundColor: '#fff',
                            pointBorderColor: '#0f172a',
                            pointRadius: 6,
                            tension: 0.2
                        },
                        {
                            label: 'Invila WaaS (Zero Capex)',
                            data: dataInvila,
                            borderColor: '#10b981',
                            backgroundColor: 'rgba(16, 185, 129, 0.1)',
                            fill: true,
                            borderWidth: 4,
                            pointBackgroundColor: '#fff',
                            pointBorderColor: '#10b981',
                            pointRadius: 6,
                            tension: 0.2
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: function(value) {
                                    return 'Rp ' + (value / 1000000000).toFixed(1) + ' M';
                                },
                                font: { size: 10, weight: 'bold' }
                            },
                            grid: { color: '#f1f5f9' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { font: { size: 10, weight: 'bold' } }
                        }
                    }
                }
            });
        }

        window.onload = updateDashboard;
    </script>
</body>
</html>
